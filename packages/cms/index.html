<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3498cf" />

    <!-- Preconnect to important origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts: Manrope for display/UI (logo, buttons, tabs, sidebar
         items, labels, headings) — narrow geometric, premium SaaS feel.
         IBM Plex Sans for body text — classic IBM-designed business
         tone, more humanistic than Inter. JetBrains Mono for slugs /
         IDs / code-style UI. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Progressive enhancement / crawler hints -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!--
      The page <title> and meta tags are injected dynamically:
        * In production served via the backend: SSR middleware replaces the
          SSR_META marker below with fully-populated per-route tags.
        * At runtime (client-side navigation): solid-meta / SeoHead updates
          the title and meta tags based on the rendered page.
      Keep the fallback title minimal so solid-meta's later injection wins.
    -->
    <title>SiteSurge</title>
    <!-- SSR_META -->

    <!-- Critical CSS for app shell -->
    <style>
      /* App shell loading state */
      html, body {
        margin: 0;
        padding: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }

      .app-shell-loading__spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #f3f4f6;
        border-top-color: #3498cf;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .page-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.9);
        z-index: 9999;
      }

      .page-loading__spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f4f6;
        border-top-color: #3498cf;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- SSR_BODY_START -->
      <!-- App shell loading state - shown before JS loads.
           In SSR mode the backend replaces everything between
           SSR_BODY_START and SSR_BODY_END with the pre-rendered
           HTML for the current route, so bots and JS-disabled
           visitors see real content. The Solid SPA's render() call
           overwrites #root on mount, so users with JS see this
           content for at most one frame before the SPA takes over. -->
      <div class="app-shell-loading">
        <div class="app-shell-loading__spinner"></div>
      </div>
      <!-- SSR_BODY_END -->
    </div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
