version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rw
      POSTGRES_USER: rw
      POSTGRES_PASSWORD: rw_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    # This compose file lives in config/; build context is the repo root (..)
    # so the Dockerfile's COPY paths (package*.json, packages/*) still resolve.
    build:
      context: ..
      dockerfile: config/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://rw:rw_dev_password@postgres:5432/rw
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production-32chars
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ../uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
