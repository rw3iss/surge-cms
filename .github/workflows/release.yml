name: Release

# Publishes @sitesurge/* to npm via Changesets, authenticating with
# **Trusted Publishing (OIDC)** — no npm token needed in CI.
#
# One-time setup on npmjs.com (per published package: @sitesurge/types,
# @sitesurge/client, @sitesurge/mcp):
#   Package → Settings → Trusted Publisher → GitHub Actions
#     Repository:  rw3iss/surge-cms
#     Workflow:    release.yml
# Trusted publishing can only be configured AFTER a package's first version
# exists, so the very first publish of each package is done manually (see
# docs/PUBLISHING.md). After that, CI publishes token-free.
#
# Flow: merge PRs containing a changeset → this opens a "Version Packages" PR →
# merging that PR builds + publishes (with provenance).

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # OIDC — required for trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # OIDC needs Node >= 22.14.0 (latest 22.x satisfies)
          cache: pnpm

      # Trusted publishing needs npm >= 11.5.1 — newer than Node 22 bundles.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # Do NOT set NODE_AUTH_TOKEN — its presence disables OIDC auto-detection.
      - name: Create Release PR or publish to npm (OIDC)
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
